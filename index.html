<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight">Budget<span style="color:var(--accent)">.</span></h1>
        <p class="text-sm mono mt-1" style="color:var(--muted)" id="month-label"></p>
      </div>
      <div class="mono text-xs px-3 py-1 rounded-full" style="background:var(--surface); border:1px solid var(--border); color:var(--muted)" id="tx-count">0 transactions</div>
    </div>

    <div class="grid md:grid-cols-3 gap-6">

      <!-- LEFT: Balance + Form -->
      <div class="md:col-span-1 flex flex-col gap-4">

        <!-- Balance Card -->
        <div class="balance-card p-6">
          <p class="text-xs font-semibold tracking-widest uppercase" style="color:var(--muted)">Net Balance</p>
          <div class="text-4xl font-extrabold mt-2 mb-5 mono" id="balance-display">$0.00</div>
          <div class="grid grid-cols-2 gap-3">
            <div class="stat-income rounded-xl p-3">
              <div class="text-xs font-semibold tracking-widest uppercase" style="color:var(--income)">Income</div>
              <div class="mono font-semibold mt-1 text-lg" id="total-income" style="color:var(--income)">$0.00</div>
            </div>
            <div class="stat-expense rounded-xl p-3">
              <div class="text-xs font-semibold tracking-widest uppercase" style="color:var(--expense)">Expenses</div>
              <div class="mono font-semibold mt-1 text-lg" id="total-expense" style="color:var(--expense)">$0.00</div>
            </div>
          </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="rounded-2xl p-5 flex flex-col gap-4" style="background:var(--surface); border:1px solid var(--border)">
          <p class="font-bold text-sm tracking-wide uppercase" style="color:var(--muted)">New Transaction</p>

          <!-- Type toggle -->
          <div class="flex gap-2">
            <button class="type-btn active-income" id="btn-income" onclick="setType('income')">↑ Income</button>
            <button class="type-btn" id="btn-expense" onclick="setType('expense')">↓ Expense</button>
          </div>

          <div>
            <label>Description</label>
            <input type="text" id="desc-input" placeholder="e.g. Freelance payment" />
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label>Amount ($)</label>
              <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01"/>
            </div>
            <div>
              <label>Category</label>
              <select id="cat-input">
                <option value="salary">💼 Salary</option>
                <option value="freelance">🎨 Freelance</option>
                <option value="other">📦 Other</option>
              </select>
            </div>
          </div>

          <div>
            <label>Date</label>
            <input type="date" id="date-input"/>
          </div>

          <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>
        </div>
      </div>

      <!-- RIGHT: Chart + Transactions -->
      <div class="md:col-span-2 flex flex-col gap-4">

        <!-- Category Breakdown Bar Chart -->
        <div class="rounded-2xl p-5" style="background:var(--surface); border:1px solid var(--border)">
          <p class="font-bold text-sm tracking-wide uppercase mb-4" style="color:var(--muted)">Category Breakdown</p>
          <div id="chart-container" class="flex flex-col gap-3">
            <p class="text-sm mono" style="color:var(--muted)">No data yet...</p>
          </div>
        </div>

        <!-- Transaction List -->
        <div class="rounded-2xl p-5 flex flex-col gap-3" style="background:var(--surface); border:1px solid var(--border)">
          <div class="flex items-center justify-between flex-wrap gap-2">
            <p class="font-bold text-sm tracking-wide uppercase" style="color:var(--muted)">Transactions</p>
            <div class="flex gap-2">
              <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
              <button class="filter-chip" onclick="setFilter('income', this)">Income</button>
              <button class="filter-chip" onclick="setFilter('expense', this)">Expenses</button>
            </div>
          </div>
          <div id="tx-list" class="flex flex-col gap-2 max-h-80 overflow-y-auto pr-1">
            <p class="text-sm mono text-center py-6" style="color:var(--muted)">No transactions yet. Add one above!</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
